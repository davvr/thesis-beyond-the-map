name: Update CIS barometers

on:
  schedule:
    # Runs every day from the 1st to the 10th of each month at 10:00 UTC
    - cron: '0 10 1-10 * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libudunits2-dev libgdal-dev libgeos-dev libproj-dev

      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2

      - name: Check for new barometer and update
        run: Rscript R/actions/update_barometers.R

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-raw/cis/ outputs/
          git diff --cached --quiet || git commit -m "Auto-update: new CIS barometer [skip ci]"
          git push origin main
