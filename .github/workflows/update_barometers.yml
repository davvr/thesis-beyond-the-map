name: Update CIS barometers

on:
  schedule:
    - cron: '0 10 1-10 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Install system dependencies and packages
        uses: r-lib/actions/setup-renv@v2

      - name: Wait before scraping (rate limit politeness)
        run: sleep 30

      - name: Check for new barometer and update
        run: Rscript R/actions/update_barometers.R
        env:
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-raw/cis/ docs/
          git diff --cached --quiet || git commit -m "Auto-update: new CIS barometer [skip ci]"
          git push origin main
