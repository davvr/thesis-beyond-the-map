name: Update CIS barometers

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout with full history for proper rebase
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install R base
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      # Install system dependencies (critical for sf, units, gdal, proj, geos)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libx11-dev \
            pandoc

      # Restore R dependencies via renv (after system packages are ready)
      - name: Restore R dependencies
        uses: r-lib/actions/setup-renv@v2

      # Politeness pause to respect rate limits
      - name: Wait before scraping
        run: sleep 30

      # Run the main update pipeline
      - name: Run update pipeline
        run: Rscript R/actions/update_barometers.R
        env:
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' }}

      # Commit and push changes with robust rebase handling
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data-raw/cis/ docs/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update: CIS barometers [skip ci]"

          git pull --rebase origin main

          git push origin main